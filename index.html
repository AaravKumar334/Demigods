
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#f0f4f0;color:#222}
nav{background:#2d5a27;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:99}
nav h1{font-size:1.3rem;font-weight:700}nav h1 span{color:#a8d5a2}
nav a{color:#a8d5a2;text-decoration:none;font-size:.82rem;font-weight:600}
nav a:hover{color:#fff}
.hero{background:linear-gradient(135deg,#2d5a27,#4a8c42);color:#fff;text-align:center;padding:48px 20px}
.hero h2{font-size:2rem;margin-bottom:8px}.hero p{opacity:.8;font-size:.95rem}
.pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.pill{background:rgba(255,255,255,.15);padding:6px 16px;border-radius:99px;font-size:.78rem}
main{max-width:900px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:24px}
.card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.card h3{font-size:1.1rem;font-weight:700;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:.78rem;font-weight:600;display:block;margin-bottom:4px;color:#555}
select,input{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:.85rem;font-family:inherit;outline:none;background:#fafafa}
select:focus,input:focus{border-color:#2d5a27}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{padding:5px 12px;border-radius:99px;border:1.5px solid #ccc;font-size:.75rem;cursor:pointer;background:#fff;transition:.2s}
.chip.on{background:#2d5a27;border-color:#2d5a27;color:#fff}
.btn{display:inline-flex;align-items:center;padding:10px 22px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;margin-top:12px;color:#fff}
.g{background:#2d5a27}.o{background:#c47d20}.b{background:#2a7a9a}.r{background:#b03030}
.out{display:none;margin-top:16px;padding:16px;border-radius:10px;font-size:.85rem;line-height:1.8}
.out.show{display:block;animation:fadeIn .3s ease}
.out-g{background:#e8f5e3;border-left:4px solid #2d5a27}
.out-o{background:#fdf3e3;border-left:4px solid #c47d20}
.out-b{background:#e3f2f8;border-left:4px solid #2a7a9a}
.out-r{background:#fde8e8;border-left:4px solid #b03030}
.out h4{margin-bottom:8px;font-size:.95rem}
.warn{background:#fff3cd;border-radius:6px;padding:8px 12px;font-size:.78rem;margin-top:8px}
footer{text-align:center;padding:20px;font-size:.78rem;color:#888}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>


</body>
</html>
